<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Countdown Timer</title>
    <meta name="description" content="A simple, elegant countdown timer with a modern dark UI.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="visually-hidden">Countdown Timer</h1>
        <div class="timer-card glassmorphism">
            <div class="timer-display" id="timerDisplay">
                <span id="minutes">00</span>:<span id="seconds">00</span>
            </div>
            
            <div class="input-group">
                <label for="timeInput" class="visually-hidden">Set Minutes</label>
                <input type="number" id="timeInput" placeholder="Enter minutes" min="1" max="999">
            </div>

            <div class="controls">
                <button id="startBtn" class="btn primary">Start</button>
                <button id="pauseBtn" class="btn secondary">Pause</button>
                <button id="resetBtn" class="btn danger">Reset</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
